# Local MySQL defaults for development. Override with SPRING_DATASOURCE_* if needed.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/payroll_system?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:payroll_app}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:localpayroll}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.sql.init.mode=never
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.data.redis.host=${SPRING_REDIS_HOST:127.0.0.1}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false
spring.session.store-type=redis
spring.session.redis.namespace=payroll:sessions
server.servlet.session.timeout=8h
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.domain=${SESSION_COOKIE_DOMAIN:}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:5173,http://localhost:5174,http://localhost:8080}
app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap.admin.name=${APP_BOOTSTRAP_ADMIN_NAME:Bootstrap Manager}
server.port=8080
