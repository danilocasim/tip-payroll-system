<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Payroll Report</title><link rel="stylesheet" href="css/styles.css"></head>
<body>
<div id="nav"></div>
<main class="container">
  <div class="footer-row">
    <h1>Payroll Report</h1>
    <div class="actions">
      <button id="pdfBtn" class="btn btn-outline manager-only">Export PDF</button>
      <button id="csvBtn" class="btn btn-outline manager-only">Export CSV</button>
      <button id="saveBtn" class="btn btn-primary manager-only">Save Snapshot</button>
    </div>
  </div>
  <div class="footer-row">
    <label>Campus Filter:
      <select id="campusFilter"><option value="">All</option><option>Casal</option><option>Arlegui</option></select>
    </label>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Name</th><th>Campus</th><th>Position</th><th>Work Area</th><th>Hours Worked</th><th>Salary</th><th>Bonus</th><th>Deductions</th><th>Net Pay</th><th>Pay Period</th></tr></thead>
      <tbody id="reportBody"></tbody>
      <tfoot><tr><th colspan="5">Totals</th><th id="tSalary">0.00</th><th id="tBonus">0.00</th><th id="tDed">0.00</th><th id="tNet">0.00</th><th>-</th></tr></tfoot>
    </table>
  </div>
</main>
<script src="js/common.js"></script>
<script src="js/payroll-report.js"></script>
</body></html>
